<style>
  :root{
    --field:#0B1E3D;
    --field-deep:#071531;
    --chalk:#F5EFDD;
    --chalk-dim:#9FB3D9;
    --dirt:#29C5F6;
    --dirt-deep:#1B8FC0;
    --seam:#B23A2E;
    --focus:#29C5F6;
    --lamp-off:#122C57;
    --lamp-on:#29C5F6;
    --radius:14px;
    --font-display:'Oswald','Arial Narrow',sans-serif;
    --font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    min-height:100dvh;
    background:
      radial-gradient(ellipse at 50% -10%, #1c4a37 0%, var(--field) 45%, var(--field-deep) 100%);
    color:var(--chalk);
    font-family:var(--font-body);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: max(16px, env(safe-area-inset-top)) 16px max(16px, env(safe-area-inset-bottom));
    overflow-x:hidden;
  }
  @font-face{
    font-family:'Oswald';
    src:local('Oswald');
  }
  .wrap{width:100%; max-width:640px; display:flex; flex-direction:column; align-items:center; gap:14px;}

  /* ---------- Header ---------- */
  header{width:100%; text-align:center; padding-top:4px;}
  .logo-img{
    width:clamp(140px,32vw,190px);
    height:auto;
    display:block;
    margin:0 auto;
    filter:drop-shadow(0 6px 16px rgba(0,0,0,.35));
  }
  .tagline{
    margin:6px 0 2px;
    font-size:11px;
    letter-spacing:4px;
    text-transform:uppercase;
    color:var(--chalk-dim);
    font-weight:600;
  }
  .subtitle{
    margin:2px 0 0;
    font-family:var(--font-display);
    font-weight:500;
    letter-spacing:1px;
    text-transform:uppercase;
    font-size:15px;
    color:var(--chalk-dim);
  }
  .stitch-rule{
    width:100%; height:10px; margin:6px 0 2px;
    background-image: radial-gradient(circle, var(--seam) 1.6px, transparent 1.6px);
    background-size: 14px 10px;
    background-position: center;
    opacity:.55;
  }

  /* ---------- Controls ---------- */
  .panel{
    width:100%;
    background:linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,.08));
    border:1px solid rgba(243,239,228,.14);
    border-radius:var(--radius);
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .row{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;}

  .seg{
    display:flex; background:rgba(0,0,0,.28); border-radius:999px; padding:3px;
    border:1px solid rgba(243,239,228,.12);
  }
  .seg button{
    border:none; background:transparent; color:var(--chalk-dim);
    font-family:var(--font-display); font-weight:600; letter-spacing:1px;
    font-size:14px; padding:8px 14px; border-radius:999px; cursor:pointer;
    transition:background .15s, color .15s;
  }
  .seg button.active{background:var(--focus); color:#071531;}

  .stat-cluster{display:flex; gap:22px;}
  .stat{text-align:center; min-width:56px;}
  .stat .num{
    font-family:var(--font-display); font-weight:700; font-size:26px; color:var(--focus);
    font-variant-numeric:tabular-nums; line-height:1;
  }
  .stat .lbl{font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--chalk-dim); margin-top:4px;}

  .btn{
    font-family:var(--font-display); font-weight:700; letter-spacing:1.5px;
    text-transform:uppercase; font-size:15px;
    border:none; border-radius:10px; padding:12px 20px; cursor:pointer;
    transition:transform .08s ease, filter .15s;
  }
  .btn:active{transform:scale(.96);}
  .btn-primary{background:var(--seam); color:var(--chalk); box-shadow:0 3px 0 #7a2620;}
  .btn-ghost{background:transparent; color:var(--chalk-dim); border:1px solid rgba(243,239,228,.25);}
  .btn-full{width:100%;}

  /* ---------- Grid ---------- */
  .field{
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,.035) 0 2px, transparent 2px 40px),
      repeating-linear-gradient(0deg, rgba(255,255,255,.035) 0 2px, transparent 2px 40px),
      var(--field-deep);
    border-radius:var(--radius);
    border:2px solid var(--dirt);
    padding:8px;
    display:grid;
    gap:6px;
  }
  .cell{
    background:linear-gradient(160deg, var(--lamp-off), #0f2e22);
    border:1px solid rgba(243,239,228,.15);
    border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:700;
    color:var(--chalk);
    font-variant-numeric:tabular-nums;
    cursor:pointer;
    transition:transform .06s ease, background .18s, box-shadow .18s, color .18s;
  }
  .cell:active{transform:scale(.93);}
  .cell.found{
    background:var(--lamp-on);
    color:#071531;
    box-shadow:0 0 0 1px var(--focus), 0 0 14px rgba(41,197,246,.55);
  }
  .cell.wrong{
    background:var(--seam) !important;
    color:var(--chalk) !important;
    animation:shake .25s;
  }
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-4px);}
    75%{transform:translateX(4px);}
  }

  /* ---------- Overlay ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(6,20,14,.88);
    display:none; align-items:center; justify-content:center; padding:20px;
    z-index:20;
  }
  .overlay.show{display:flex;}
  .card{
    background:var(--field); border:1px solid rgba(243,239,228,.2); border-radius:18px;
    padding:28px 24px; text-align:center; max-width:360px; width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
  .card h2{
    font-family:var(--font-display); text-transform:uppercase; letter-spacing:1px;
    margin:0 0 4px; font-size:22px; color:var(--focus);
  }
  .card p.sub{color:var(--chalk-dim); font-size:13px; margin:0 0 18px;}
  .result-row{display:flex; justify-content:center; gap:28px; margin-bottom:20px;}
  .result-row .num{font-size:32px;}
  .best-line{font-size:12px; color:var(--chalk-dim); margin-bottom:18px; letter-spacing:.5px;}
  .best-line b{color:var(--focus);}

  footer{margin-top:auto; padding-top:18px; text-align:center;}
  footer .foot-tag{font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--chalk-dim); opacity:.6;}

  @media (prefers-reduced-motion: reduce){
    .cell, .btn{transition:none;}
    .cell.wrong{animation:none;}
  }
</style>
</head>

    <p class="tagline">Attitude &middot; Effort &middot; Respect</p>
    <p class="subtitle">Concentration Grid — Focus Trainer</p>
  </header>

  <div class="stitch-rule"></div>

  <div class="panel">
    <div class="row">
      <div class="seg" id="sizeSeg">
        <button data-size="3">3×3</button>
        <button data-size="5" class="active">5×5</button>
        <button data-size="10">10×10</button>
      </div>
      <button class="btn btn-primary" id="startBtn">Start</button>
    </div>
    <div class="row">
      <div class="stat-cluster">
        <div class="stat">
          <div class="num" id="nextNum">1</div>
          <div class="lbl">Find</div>
        </div>
        <div class="stat">
          <div class="num" id="timer">0.0</div>
          <div class="lbl">Seconds</div>
        </div>
        <div class="stat">
          <div class="num" id="missCount">0</div>
          <div class="lbl">Misses</div>
        </div>
      </div>
      <button class="btn btn-ghost" id="resetBtn">Reset</button>
    </div>
  </div>

  <div class="field" id="field"></div>

  <footer>
    <p class="foot-tag">BMP Baseball Coach Toolkit</p>
  </footer>
</div>

<div class="overlay" id="overlay">
  <div class="card">
    <h2 id="resultTitle">Grid Cleared</h2>
    <p class="sub">Eyes up. Every rep sharpens the focus.</p>
    <div class="result-row">
      <div class="stat"><div class="num" id="finalTime">0.0</div><div class="lbl">Seconds</div></div>
      <div class="stat"><div class="num" id="finalMiss">0</div><div class="lbl">Misses</div></div>
    </div>
    <div class="best-line" id="bestLine"></div>
    <button class="btn btn-primary btn-full" id="againBtn">Run It Back</button>
  </div>
</div>

<script>
(function(){
  var field = document.getElementById('field');
  var timerEl = document.getElementById('timer');
  var nextNumEl = document.getElementById('nextNum');
  var missCountEl = document.getElementById('missCount');
  var startBtn = document.getElementById('startBtn');
  var resetBtn = document.getElementById('resetBtn');
  var sizeSeg = document.getElementById('sizeSeg');
  var overlay = document.getElementById('overlay');
  var finalTime = document.getElementById('finalTime');
  var finalMiss = document.getElementById('finalMiss');
  var bestLine = document.getElementById('bestLine');
  var againBtn = document.getElementById('againBtn');
  var resultTitle = document.getElementById('resultTitle');

  var size = 5;
  var total = size*size;
  var next = 1;
  var misses = 0;
  var running = false;
  var startTime = 0;
  var rafId = null;
  var cells = [];

  function shuffledNumbers(n){
    var arr = [];
    for (var i=1;i<=n;i++) arr.push(i);
    for (var j=arr.length-1;j>0;j--){
      var k = Math.floor(Math.random()*(j+1));
      var tmp = arr[j]; arr[j]=arr[k]; arr[k]=tmp;
    }
    return arr;
  }

  function bestKey(){ return 'bmp_cg_best_' + size; }

  function loadBest(){
    var v = localStorage.getItem(bestKey());
    return v ? parseFloat(v) : null;
  }

  function saveBestIfBetter(t){
    var b = loadBest();
    if (b === null || t < b){
      localStorage.setItem(bestKey(), t.toFixed(2));
      return true;
    }
    return false;
  }

  function buildGrid(){
    field.innerHTML = '';
    field.style.gridTemplateColumns = 'repeat(' + size + ', 1fr)';
    var nums = shuffledNumbers(total);
    cells = [];
    var fontSize = size === 3 ? 34 : (size === 5 ? 22 : 13);
    nums.forEach(function(n){
      var c = document.createElement('div');
      c.className = 'cell';
      c.textContent = n;
      c.style.fontSize = fontSize + 'px';
      c.dataset.value = n;
      c.addEventListener('click', function(){ onTap(c, n); });
      field.appendChild(c);
      cells.push(c);
    });
  }

  function resetState(startFresh){
    next = 1;
    misses = 0;
    running = false;
    startTime = 0;
    if (rafId) cancelAnimationFrame(rafId);
    nextNumEl.textContent = next;
    missCountEl.textContent = misses;
    timerEl.textContent = '0.0';
    overlay.classList.remove('show');
    buildGrid();
  }

  function onTap(cellEl, n){
    if (!running) return;
    if (n === next){
      cellEl.classList.add('found');
      cellEl.style.pointerEvents = 'none';
      next++;
      nextNumEl.textContent = next > total ? total : next;
      if (next > total){
        finish();
      }
    } else {
      misses++;
      missCountEl.textContent = misses;
      cellEl.classList.remove('wrong');
      void cellEl.offsetWidth;
      cellEl.classList.add('wrong');
      setTimeout(function(){ cellEl.classList.remove('wrong'); }, 250);
    }
  }

  function tick(){
    if (!running) return;
    var elapsed = (performance.now() - startTime) / 1000;
    timerEl.textContent = elapsed.toFixed(1);
    rafId = requestAnimationFrame(tick);
  }

  function start(){
    resetState();
    running = true;
    startTime = performance.now();
    rafId = requestAnimationFrame(tick);
    startBtn.textContent = 'Restart';
  }

  function finish(){
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    var elapsed = (performance.now() - startTime) / 1000;
    timerEl.textContent = elapsed.toFixed(1);
    finalTime.textContent = elapsed.toFixed(1);
    finalMiss.textContent = misses;
    var isBest = saveBestIfBetter(elapsed);
    var best = loadBest();
    resultTitle.textContent = isBest ? 'New Best!' : 'Grid Cleared';
    bestLine.innerHTML = 'Best for ' + size + '×' + size + ': <b>' + best.toFixed(1) + 's</b>';
    overlay.classList.add('show');
  }

  startBtn.addEventListener('click', start);
  resetBtn.addEventListener('click', function(){ resetState(); startBtn.textContent = 'Start'; });
  againBtn.addEventListener('click', start);

  sizeSeg.addEventListener('click', function(e){
    var btn = e.target.closest('button');
    if (!btn) return;
    Array.prototype.forEach.call(sizeSeg.children, function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    size = parseInt(btn.dataset.size, 10);
    total = size*size;
    resetState();
    startBtn.textContent = 'Start';
  });

  resetState();
})();
</script>
